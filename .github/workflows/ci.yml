name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run test suite
        run: |
          pytest tests/ -v
      # Core supervision logic is deliberately testable with zero API keys --
      # no secrets are needed for CI to be meaningful (see DECISIONS.md).
